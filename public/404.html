<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crome696 | Redirecting</title>
    <script>
      (function () {
        var base = "/";
        var path = window.location.pathname;
        var route = path.indexOf(base) === 0 ? path.slice(base.length) : "";
        var target = "/" + route + window.location.search + window.location.hash;

        window.sessionStorage.setItem("crome696:redirect", target);
        window.location.replace(base);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
